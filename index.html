    :root {

      --g500: #3d8b3d;
      --g100: #e8f2e8;

      --b100: #f5ede4;
      --gold: #d4a017;
      --white: #ffffff;
      --cream: #faf8f4;
      --border: #e0dbd3;
      --text: #1a1a1a;
      --text-mid: #444;
      --text-soft: #777;

    html  { scroll-behavior: smooth; }
    body  {

    img { display: block; max-width: 100%; }
    a   { text-decoration: none; color: inherit; }

    body.tamil p, body.tamil span,
    body.tamil a, body.tamil button,
    body.tamil div, body.tamil li {

    }

    .container {
      max-width: 880px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ══ LANGUAGE BAR (top strip) ═══════════════════════════════ */
    .lang-bar {
      background: var(--g900);
      padding: 7px 0;
    }
    .lang-bar-inner {

      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }
    .lang-bar-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,.65);
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      font-family: 'Nunito Sans', sans-serif;
    }
    .lang-pill {
      display: flex;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 999px;
      padding: 3px;
      gap: 2px;
    }
    .lang-btn {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: .5px;
      padding: 5px 15px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,.7);
      transition: background .22s, color .22s;
      white-space: nowrap;
    }
    .lang-btn.active {
      background: var(--gold);
      color: var(--g900);
    }

    /* ══ HEADER ═════════════════════════════════════════════════ */
    header {

    .header-inner {

      align-items: center;

      padding: 14px 0;
    }
    .logo-leaf {
      flex-shrink: 0;
      width: 46px; height: 46px;
      background: var(--gold);
      border-radius: 50% 50% 50% 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(0,0,0,.2);
    }
    .logo-leaf svg { width: 24px; height: 24px; fill: var(--g900); }
    .logo-text { display: flex; flex-direction: column; gap: 3px; flex: 1; }

      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.05rem, 3.5vw, 1.55rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.15;
      border-bottom: 2.5px solid var(--gold);
      padding-bottom: 3px;
      display: inline-block;
      text-shadow: 0 0 20px rgba(212,160,23,.4);

      letter-spacing: .5px;
      padding: 3px 10px;

    .ci.wa .ico { fill: var(--wa-dk); }
    .ci.br { background: var(--b100); }
    .ci.br .ico { fill: var(--b700); }
    .ci .ico { width: 19px; height: 19px; }
    .cd { flex: 1; min-width: 0; }
    .cd-lbl {
      display: block;
      font-size: .67rem; font-weight: 800;
      letter-spacing: 1.4px; text-transform: uppercase;
      color: var(--text-soft); margin-bottom: 2px;
      font-family: 'Nunito Sans', sans-serif;

    .cd-val { font-size: .95rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cd-val a { color: var(--text); transition: color .2s; }
    .cd-val a:hover { color: var(--g700); }
    .cd-act { flex-shrink: 0; }

    #map { background: var(--g050); border-top: 1px solid var(--border); text-align: center; }
    #map .divider { margin: 0 auto 16px; }
    .map-frame {
      margin-top: 24px; border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--sh-md);
      height: 270px; background: #c8ddc8;
    }
    .map-frame iframe { width: 100%; height: 100%; border: none; display: block; }
    .map-cta { margin-top: 16px; }

    /* ══ FOOTER ═════════════════════════════════════════════════ */
    footer {
      background: var(--g900);

      padding: 28px 0;

    body.tamil .ft-name { font-family: 'Tiro Tamil', serif; }
    .ft-phone { font-size: .87rem; margin-bottom: 6px; }
    .ft-phone a { color: rgba(255,255,255,.8); font-weight: 600; }
    .ft-phone a:hover { color: var(--white); }
    .ft-note { font-size: .72rem; color: rgba(255,255,255,.45); }

    /* ══ RESPONSIVE ═════════════════════════════════════════════ */
    @media (max-width: 560px) {

      #hero   { padding: 38px 0 44px; }
      .about-row  { flex-direction: column; gap: 14px; }
      .ctc-row    { flex-wrap: wrap; }
      .cd-act     { width: 100%; }
      .cd-act .btn-wa, .cd-act .btn-call { width: 100%; justify-content: center; }

    }
    @media (max-width: 380px) {
      .logo-name    { font-size: .95rem; }
      .logo-tagline { font-size: .62rem; }
      .lang-btn     { padding: 5px 10px; font-size: .7rem; }
    }
  </style>
</head>

<!-- JAVASCRIPT — language engine -->
<script>
  function render(lang) {
    const d = CONTENT[lang];

    /* fill every data-k element */
    document.querySelectorAll('[data-k]').forEach(function(el) {
      var k = el.getAttribute('data-k');
      if (d[k] !== undefined) el.textContent = d[k];
    });

    /* set hrefs and dynamic link text */
    document.getElementById('waHeroBtn').href          = WA_HREF;
    document.getElementById('waContactBtn').href       = WA_HREF;
    document.getElementById('callBtn').href            = PHONE_HREF;
    document.getElementById('phoneLink').href          = PHONE_HREF;
    document.getElementById('phoneLink').textContent   = d.phoneNum;
    document.getElementById('footerPhone').href        = PHONE_HREF;
    document.getElementById('footerPhone').textContent = d.phoneNum;
    document.getElementById('mapBtn').href             = MAP_HREF;
  }

  function setLang(lang) {
    document.getElementById('btnEn').classList.toggle('active', lang === 'en');
    document.getElementById('btnTa').classList.toggle('active', lang === 'ta');
    document.body.classList.toggle('tamil', lang === 'ta');
    document.documentElement.lang = lang === 'ta' ? 'ta' : 'en';
    render(lang);
  }

  /* boot — render English on first load */
  render('en');
</script>
